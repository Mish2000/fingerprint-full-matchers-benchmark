name: runtime-ci

on:
  push:
    branches: [main]

jobs:
  dataset-independent-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate SourceAFIS policy application package
        shell: bash
        run: |
          if [ -d evaluations/sourceafis_policy_application_v1 ]; then
            python tools/validate_sourceafis_policy_application_v1.py
          else
            echo 'Policy application package not recorded yet; static validation skipped.'
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
      - name: Install Python package
        run: python -m pip install '.[test]'
      - name: Validate NBIS candidate audit package
        shell: bash
        run: |
          if [ -d audits/nbis_candidate_v1 ]; then
            python tools/validate_nbis_candidate_audit_v1.py
            python -m pytest -q tests/test_nbis_candidate_audit_v1.py
          else
            echo 'NBIS candidate audit package not recorded yet; static validation skipped.'
          fi
      - name: Validate NBIS candidate audit erratum 1
        shell: bash
        run: |
          if [ -d audits/nbis_candidate_v1_erratum_1 ]; then
            python tools/validate_nbis_candidate_v1_erratum_1.py
            python -m pytest -q tests/test_nbis_candidate_v1_erratum_1.py
          else
            echo 'NBIS candidate audit erratum 1 not recorded yet; static validation skipped.'
          fi
      - name: Run dataset-independent Python tests
        run: >-
          python -m pytest -q
          tests/test_benchmark_contract.py
          tests/test_benchmark_runner.py
          tests/test_protocol_manifest_reader.py
          tests/test_sourceafis_adapter.py
          tests/test_sourceafis_client.py
          tests/test_sourceafis_sidecar_lifecycle.py
          tests/test_forbidden_runtime_coupling.py
          tests/test_sourceafis_runtime_qualification.py
          tests/test_sourceafis_decision_policy_v1.py
          tests/test_sourceafis_frozen_cohort_v1.py
          tests/test_sourceafis_policy_application_v1.py
      - name: Validate frozen SourceAFIS decision policy
        run: python tools/validate_sourceafis_decision_policy_v1.py
      - name: Validate SourceAFIS frozen-cohort execution package
        shell: bash
        run: |
          if [ -d executions/sourceafis_frozen_cohort_v1 ]; then
            python tools/validate_sourceafis_frozen_cohort_v1.py
          else
            echo 'Execution package not recorded yet; static validation skipped.'
          fi
      - name: Test and build Java 11 sidecar
        run: mvn -f apps/sourceafis-sidecar/pom.xml clean test package
      - name: Run health and malformed-input smoke checks
        run: >-
          fingerprint-benchmark sourceafis-smoke
          --jar apps/sourceafis-sidecar/target/sourceafis-sidecar-1.0.0-all.jar
      - name: Confirm generated artifacts are untracked
        shell: bash
        run: |
          if git ls-files | grep -E '(\.jar$|(^|/)target/|__pycache__|\.pyc$)'; then
            echo 'Generated artifact is tracked.' >&2
            exit 1
          fi
